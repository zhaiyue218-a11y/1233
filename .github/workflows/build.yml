name: Build EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    # 检出代码
    - name: Checkout code
      uses: actions/checkout@v3
    
    # 设置 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    # 安装依赖
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas numpy matplotlib
    
    # 构建 EXE
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "MOS_Data_Processor_GUI" mos_data_processor_gui_v2.py
    
    # 上传构建产物
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: MOS_Data_Processor_GUI
        path: dist/
        retention-days: 30
